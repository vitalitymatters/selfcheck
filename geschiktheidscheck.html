<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {

  .progress-bar { height: 4px; background: var(--sage-mid); border-radius: 100px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--sage); border-radius: 100px; transition: width 0.4s ease; }
  .category-label { font-size: 11px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--sage); margin-bottom: 10px; }
  .question-card { background: #fff; border-radius: var(--radius); padding: 28px 28px 24px; border: 1px solid #e4ece5; margin-bottom: 16px; animation: fadeUp 0.35s ease forwards; }
  .question-note { font-size: 12px; color: var(--text-light); font-style: italic; margin-bottom: 14px; line-height: 1.5; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .question-text { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 400; line-height: 1.45; color: var(--text); margin-bottom: 20px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option { display: flex; align-items: flex-start; gap: 12px; padding: 13px 16px; border-radius: 10px; border: 1.5px solid #e4ece5; background: var(--cream); cursor: pointer; transition: border-color 0.2s, background 0.2s; text-align: left; width: 100%; font-family: 'DM Sans', sans-serif; }
  .option:hover { border-color: var(--sage-mid); background: var(--sage-light); }
  .option.selected { border-color: var(--sage); background: var(--sage-light); }
  .option-dot { width: 18px; height: 18px; min-width: 18px; border-radius: 50%; border: 2px solid var(--sage-mid); margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: border-color 0.2s, background 0.2s; flex-shrink: 0; }
  .option.selected .option-dot { border-color: var(--sage); background: var(--sage); }
  .option.selected .option-dot::after { content: ''; width: 6px; height: 6px; background: #fff; border-radius: 50%; }
  .option-text { font-size: 14px; line-height: 1.5; color: var(--text-mid); }
  .option.selected .option-text { color: var(--text); }
  .checkbox-group { display: flex; flex-direction: column; gap: 10px; }
  .checkbox-option { display: flex; align-items: flex-start; gap: 12px; padding: 13px 16px; border-radius: 10px; border: 1.5px solid #e4ece5; background: var(--cream); cursor: pointer; transition: border-color 0.2s, background 0.2s; text-align: left; width: 100%; font-family: 'DM Sans', sans-serif; }
  .checkbox-option:hover { border-color: var(--sage-mid); background: var(--sage-light); }
  .checkbox-option.checked { border-color: var(--sage); background: var(--sage-light); }
  .checkbox-box { width: 18px; height: 18px; min-width: 18px; border-radius: 4px; border: 2px solid var(--sage-mid); margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: border-color 0.2s, background 0.2s; flex-shrink: 0; }
  .checkbox-option.checked .checkbox-box { border-color: var(--sage); background: var(--sage); }
  .checkbox-option.checked .checkbox-box::after { content: '✓'; font-size: 11px; color: #fff; font-weight: 500; }
  .checkbox-footer { margin-top: 16px; }
  .btn-next { background: var(--sage); color: #fff; padding: 12px 28px; border-radius: 100px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; border: none; cursor: pointer; transition: opacity 0.2s; }
  .btn-next:hover { opacity: 0.9; }
  .nav { display: flex; align-items: center; margin-top: 4px; }
  .btn-ghost { background: transparent; color: var(--text-light); padding: 12px 16px; border-radius: 100px; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; border: none; transition: color 0.2s; }
  .btn-ghost:hover { color: var(--text); }
  .result { display: none; animation: fadeUp 0.4s ease forwards; }
  .result-header { background: #fff; border-radius: var(--radius); padding: 32px 28px; border: 1px solid #e4ece5; margin-bottom: 16px; text-align: center; }
  .result-icon { width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 28px; }
  .icon-ja { background: var(--sage-light); }
  .icon-mogelijk { background: var(--sage-mid); }
  .icon-nee { background: var(--red-light); }
  .result-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; margin-bottom: 10px; line-height: 1.3; }
  .result-intro { font-size: 14px; color: var(--text-mid); line-height: 1.7; max-width: 460px; margin: 0 auto; }
  .result-pill { display: inline-block; font-size: 12px; font-weight: 600; padding: 4px 14px; border-radius: 100px; margin-bottom: 16px; letter-spacing: 0.04em; }
  .pill-ja { background: var(--sage-light); color: var(--sage); }
  .pill-mogelijk { background: var(--sage-mid); color: var(--sage); }
  .pill-nee { background: var(--red-light); color: var(--red); }
  .reason-block { background: #fff; border-radius: var(--radius); border: 1px solid #e4ece5; padding: 20px 24px; margin-bottom: 12px; }
  .reason-block h3 { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
  .reason-block p { font-size: 13px; color: var(--text-mid); line-height: 1.7; }
  .cta-block { border-radius: var(--radius); padding: 28px; margin-bottom: 16px; text-align: center; }
  .cta-ja { background: var(--sage); }
  .cta-mogelijk { background: var(--sage-mid); }
  .cta-nee { background: #4a5c4e; }
  .cta-block h3 { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 8px; }
  .cta-block p { font-size: 14px; color: rgba(255,255,255,0.85); line-height: 1.65; margin-bottom: 20px; }
  .btn-cta { display: inline-block; background: #fff; padding: 13px 28px; border-radius: 100px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; text-decoration: none; border: none; cursor: pointer; transition: opacity 0.2s; }
  .btn-cta-ja { color: var(--sage); }
  .btn-cta-mogelijk { color: var(--sage); }
  .btn-cta-nee { color: #4a5c4e; }
  .btn-cta:hover { opacity: 0.9; }
  .restart-wrap { text-align: center; margin-top: 24px; }
  .restart-wrap button { background: none; border: none; color: var(--text-light); font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; text-decoration: underline; }
  .footer { text-align: center; margin-top: 48px; font-size: 12px; color: var(--text-light); }
</style>

<script>
const questions = [
  {
    cat: "Uw situatie",
    q: "Hoe oud bent u?",
    type: "options",
    opts: [
      { label: "Jonger dan 50 jaar", code: "leeftijd_jong", reden: "leeftijd_jong" },
      { label: "Tussen 50 en 75 jaar", code: "ja", reden: null },
      { label: "Ouder dan 75 jaar", code: "leeftijd_oud", reden: "leeftijd_oud" },
    ]
  },
  {
    cat: "Uw situatie",
    q: "Waarom bent u geïnteresseerd in het programma?",
    note: "U hoeft geen diagnose te hebben, het programma is ook geschikt als preventief traject.",
    type: "options",
    opts: [
      { label: "Ik heb knieklachten en wil daar actief mee aan de slag", code: "ja", reden: null },
      { label: "Bij mij is artrose aan de knie vastgesteld", code: "ja_artrose", reden: null },
      { label: "Ik heb (nog) geen knieklachten maar wil preventief werken aan mijn gezondheid en vitaliteit", code: "ja_preventief", reden: null },
    ]
  },
  {
    cat: "Uw klachten",
    q: "Is er sprake van zwelling?",
    type: "options",
    opts: [
      { label: "Ja, er is extreme zwelling en de knie is ook warm en rood", code: "nee", reden: "acute_ontsteking" },
      { label: "Ja, er is enige zwelling aanwezig", code: "ja", reden: null },
      { label: "Nee, de knie is niet gezwollen", code: "ja", reden: null },
    ]
  },
  {
    cat: "Uw klachten",
    q: "Kunt u de knie rond krijgen op een fiets?",
    note: "Als dit vanwege extreme stijfheid niet lukt, is een individuele beoordeling de beste eerste stap.",
    type: "options",
    opts: [
      { label: "Nee, de knie is te stijf om rond te trappen", code: "nee", reden: "beweeglijkheid" },
      { label: "Ja, dat lukt maar wel met moeite", code: "ja", reden: null },
      { label: "Ja, dat gaat nog makkelijk", code: "ja", reden: null },
    ]
  },
  {
    cat: "Uw klachten",
    q: "Is er sprake van slotklachten?",
    note: "Slotklachten betekenen dat de knie tijdelijk vastloopt en u hem niet meer kunt strekken of buigen totdat het 'los' schiet. Dit is iets anders dan kraken of klikken.",
    type: "options",
    opts: [
      { label: "Ja, de knie blokkeert weleens volledig", code: "mogelijk", reden: "slotklachten" },
      { label: "Nee, de knie kraakt en klikt wel maar blokkeert niet", code: "ja", reden: null },
      { label: "Er is geen sprake van slotklachten", code: "ja", reden: null },
    ]
  },
  {
    cat: "Gezondheid",
    q: "Heeft u een of meer van de volgende aandoeningen?",
    note: "Selecteer alles wat van toepassing is.",
    type: "checkbox",
    opts: [
      { label: "Hartaandoening (bijv. hartfalen, na een hartinfarct)", code: "comorbiditeit" },
      { label: "COPD of ernstige longaandoening", code: "comorbiditeit" },
      { label: "Diabetes (type 1 of 2)", code: "comorbiditeit" },
      { label: "Kanker (actief of in behandeling)", code: "comorbiditeit" },
      { label: "Geen van bovenstaande", code: "geen", none: true },
    ]
  },
  {
    cat: "Gezondheid",
    q: "Maakt u gebruik van een loophulpmiddel?",
    type: "options",
    opts: [
      { label: "Ja, ik ben afhankelijk van een rollator of looprek", code: "mogelijk", reden: "rollator" },
      { label: "Ja, ik gebruik soms een stok of kruk", code: "ja", reden: null },
      { label: "Nee, ik loop zelfstandig", code: "ja", reden: null },
    ]
  },
  {
    cat: "Motivatie",
    q: "Bent u bereid om actief te werken aan uw knieklachten of vitaliteit?",
    note: "Het programma vraagt eigen inzet, denk aan bewegingsoefeningen en leefstijlaanpassingen.",
    type: "options",
    opts: [
      { label: "Ja, ik ben gemotiveerd en wil er actief mee aan de slag", code: "ja", reden: null },
      { label: "Ik wil wel, maar weet niet of ik het volhoud", code: "ja", reden: null },
      { label: "Ik twijfel nog of een actieve aanpak bij mij past", code: "mogelijk", reden: "twijfel_aanpak" },
    ]
  },
  {
    cat: "Verwachting",
    q: "Wat hoopt u te bereiken met Artrose in Beweging?",
    type: "options",
    opts: [
      { label: "Minder pijn en meer kunnen bewegen in het dagelijks leven", code: "ja", reden: null },
      { label: "Weten wat ik zelf kan doen om mijn knie en vitaliteit te ondersteunen", code: "ja", reden: null },
      { label: "Volledig herstel, ik wil geen enkele klacht meer", code: "mogelijk", reden: "verwachting" },
    ]
  },
  {
    cat: "Online programma",
    q: "Heeft u toegang tot internet en bent u comfortabel met het gebruik van een computer, tablet of smartphone?",
    note: "Artrose in Beweging is een volledig online programma.",
    type: "options",
    opts: [
      { label: "Ja, dat is geen probleem", code: "ja", reden: null },
      { label: "Ik heb toegang maar vind digitale hulpmiddelen soms lastig", code: "mogelijk", reden: "digitaal" },
      { label: "Nee, ik heb geen internettoegang of gebruik liever geen digitale middelen", code: "nee", reden: "geen_internet" },
    ]
  },
];

const TOTAL = questions.length;

const redenen = {
  leeftijd_jong: {
    titel: "Leeftijd onder de primaire doelgroep",
    tekst: "Het programma is ontwikkeld voor mensen van 50 jaar en ouder, maar dat sluit jongere deelnemers zeker niet uit. Ik kijk graag samen met u of de inhoud en intensiteit goed bij uw situatie passen.",
  },
  leeftijd_oud: {
    titel: "Leeftijd boven de primaire doelgroep",
    tekst: "Het programma is ontwikkeld voor mensen tot 75 jaar. Boven deze leeftijd kan de intensiteit minder goed aansluiten.",
  },
  acute_ontsteking: {
    titel: "Mogelijke acute ontsteking",
    tekst: "Extreme zwelling in combinatie met warmte en roodheid kan wijzen op een acute ontsteking. Het is verstandig om eerst uw huisarts of specialist te raadplegen voordat u met een oefenprogramma start.",
  },
  slotklachten: {
    titel: "Slotklachten",
    tekst: "Slotklachten, waarbij de knie volledig blokkeert, kunnen wijzen op een losliggend lichaam in het gewricht of een meniscusscheur. Ik zou graag wat verdere vragen willen stellen om te achterhalen of hier sprake van kan zijn.",
  },
  beweeglijkheid: {
    titel: "Sterk beperkte beweeglijkheid",
    tekst: "Als de knie zo stijf is dat rondtrappen op een fiets niet lukt, is individuele fysiotherapeutische begeleiding waarschijnlijk een betere eerste stap.",
  },
  comorbiditeiten: {
    titel: "Bijkomende aandoeningen",
    tekst: "Bij twee of meer bijkomende aandoeningen is maatwerk belangrijk. Een online programma is dan mogelijk niet de beste keuze. Overleg eerst met uw behandelend arts.",
  },
  rollator: {
    titel: "Gebruik van rollator of looprek",
    tekst: "Het programma vraagt een bepaald basisniveau van zelfstandig bewegen. Bent u afhankelijk van een rollator of looprek, dan is het de vraag of de intensiteit goed aansluit.",
  },
  motivatie: {
    titel: "Twijfel over volhouden",
    tekst: "Het programma vraagt regelmaat en eigen inzet. Dat is voor veel mensen spannend, en begrijpelijk. In een kennismakingsgesprek bespreek ik graag hoe ik u daarin kan ondersteunen.",
  },
  twijfel_aanpak: {
    titel: "Twijfel over actieve aanpak",
    tekst: "Een actieve aanpak vraagt iets van u, maar levert ook het meeste op. In een persoonlijk gesprek bespreek ik graag uw twijfels en licht ik het programma verder toe, zodat u een weloverwogen keuze kunt maken.",
  },
  verwachting: {
    titel: "Verwachting van volledig herstel",
    tekst: "Of volledig herstel realistisch is, hangt sterk af van uw situatie, onder andere hoe lang u al klachten heeft en wat u al heeft geprobeerd.",
  },
  digitaal: {
    titel: "Digitale vaardigheid",
    tekst: "Het programma is volledig online. Als u digitale hulpmiddelen soms lastig vindt, kan dat een drempel zijn.",
  },
  geen_internet: {
    titel: "Geen internettoegang",
    tekst: "Omdat het programma volledig online wordt aangeboden, is internettoegang noodzakelijk. Heeft u hier vragen over, neem dan gerust contact op.",
  },
};

let current = 0;
let answers = new Array(TOTAL).fill(null);

function render() {
  const q = questions[current];
  document.getElementById('cat-label').textContent = q.cat;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('q-text').textContent = q.q;
  const noteEl = document.getElementById('q-note');
  if (q.note) { noteEl.textContent = q.note; noteEl.style.display = 'block'; } else { noteEl.style.display = 'none'; }

  const pct = Math.round((current / TOTAL) * 100);
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('q-counter').textContent = `Vraag ${current + 1} van ${TOTAL}`;
  document.getElementById('q-pct').textContent = pct + '%';

  const optsEl = document.getElementById('q-options');
  optsEl.innerHTML = '';

  if (q.type === 'options') {
    const wrap = document.createElement('div');
    wrap.className = 'options';
    q.opts.forEach((o, i) => {
      const btn = document.createElement('button');
      btn.className = 'option' + (answers[current] !== null && answers[current].idx === i ? ' selected' : '');
      btn.innerHTML = `<div class="option-dot"></div><span class="option-text">${o.label}</span>`;
      btn.onclick = () => {
        answers[current] = { idx: i, code: o.code, reden: o.reden };
        document.querySelectorAll('.option').forEach((el, j) => el.classList.toggle('selected', j === i));
        setTimeout(advance, 220);
      };
      wrap.appendChild(btn);
    });
    optsEl.appendChild(wrap);

  } else if (q.type === 'checkbox') {
    const saved = answers[current] ? answers[current].checked : [];
    const wrap = document.createElement('div');
    wrap.className = 'checkbox-group';
    q.opts.forEach((o, i) => {
      const btn = document.createElement('button');
      btn.className = 'checkbox-option' + (saved.includes(i) ? ' checked' : '');
      btn.innerHTML = `<div class="checkbox-box"></div><span class="option-text">${o.label}</span>`;
      btn.onclick = () => toggleCheckbox(i, !!o.none);
      wrap.appendChild(btn);
    });
    const footer = document.createElement('div');
    footer.className = 'checkbox-footer';
    const nextBtn = document.createElement('button');
    nextBtn.className = 'btn-next';
    nextBtn.textContent = 'Volgende →';
    nextBtn.onclick = commitCheckbox;
    footer.appendChild(nextBtn);
    optsEl.appendChild(wrap);
    optsEl.appendChild(footer);
  }

  document.getElementById('btn-prev').style.visibility = current === 0 ? 'hidden' : 'visible';
  const card = document.getElementById('q-card');
  card.style.animation = 'none'; card.offsetHeight; card.style.animation = '';
}

function toggleCheckbox(idx, isNone) {
  if (!answers[current]) answers[current] = { checked: [] };
  const checked = answers[current].checked;
  const q = questions[current];
  const noneIdx = q.opts.findIndex(o => o.none);

  if (isNone) {
    answers[current].checked = checked.includes(idx) ? [] : [idx];
  } else {
    const withoutNone = checked.filter(i => i !== noneIdx);
    answers[current].checked = checked.includes(idx)
      ? withoutNone.filter(i => i !== idx)
      : [...withoutNone, idx];
  }
  render();
}

function commitCheckbox() {
  const q = questions[current];
  const checked = (answers[current] && answers[current].checked) ? answers[current].checked : [];
  const noneIdx = q.opts.findIndex(o => o.none);
  const count = checked.filter(i => i !== noneIdx && q.opts[i].code === 'comorbiditeit').length;

  if (count >= 2) {
    answers[current] = { checked, code: 'mogelijk', reden: 'comorbiditeiten', count };
  } else {
    answers[current] = { checked, code: 'ja', reden: null, count };
  }
  advance();
}

function advance() {
  if (current < TOTAL - 1) { current++; render(); } else showResult();
}

function prev() { if (current > 0) { current--; render(); } }

function showResult() {
  document.getElementById('quiz-section').style.display = 'none';
  document.getElementById('result-section').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });

  const hardNee = [];
  const mogelijkRedenen = [];
  let artroseBevestigd = false;
  let preventief = false;

  // First pass: detect flags
  answers.forEach(a => {
    if (!a) return;
    if (a.code === 'ja_artrose') artroseBevestigd = true;
    if (a.code === 'ja_preventief') preventief = true;
  });

  // Second pass: score
  answers.forEach(a => {
    if (!a) return;
    if (a.code === 'nee' && a.reden) hardNee.push(a.reden);
    if (a.code === 'mogelijk' && a.reden) mogelijkRedenen.push(a.reden);
    if (a.code === 'leeftijd_jong') {
      mogelijkRedenen.push('leeftijd_jong');
    }
    if (a.code === 'leeftijd_oud') {
      mogelijkRedenen.push('leeftijd_oud');
    }
  });

  let uitslag;
  if (hardNee.length > 0) {
    uitslag = 'nee';
  } else if (mogelijkRedenen.length > 0) {
    uitslag = 'mogelijk';
  } else {
    uitslag = 'ja';
  }
  if (artroseBevestigd && uitslag === 'mogelijk') uitslag = 'ja';

  const introJa = artroseBevestigd
    ? 'Bij u is artrose aan de knie vastgesteld, dat is precies de doelgroep van Artrose in Beweging. Het programma helpt u beter te bewegen, minder pijn te ervaren en de regie over uw knie terug te krijgen.'
    : preventief
    ? 'Geen knieklachten, maar wel bewust bezig met uw gezondheid en vitaliteit. De inhoud van Artrose in Beweging is ook zeer geschikt voor mensen die preventief willen werken aan sterke knieën en een actief, vitaal leven.'
    : 'Op basis van uw antwoorden past u goed binnen de doelgroep van Artrose in Beweging. U staat open voor een actieve aanpak en heeft een realistische verwachting. Dat is een uitstekende basis.';

  const data = {
    ja: {
      icon: '✓', iconClass: 'icon-ja',
      pill: 'Geschikt', pillClass: 'pill-ja',
      title: 'Het programma lijkt goed bij u te passen',
      intro: introJa,
      ctaKlasse: 'cta-ja', ctaBtnKlasse: 'btn-cta-ja',
      ctaTitel: 'Klaar om de eerste stap te zetten?',
      ctaTekst: 'Bekijk de website voor alle informatie en opties. Twijfelt u nog of heeft u een vraag? Laat uw gegevens achter en ik neem persoonlijk contact met u op.',
      ctaLabel: 'Bekijk de website →',
      ctaLabel2: 'Laat uw gegevens achter →',
      ctaUrl: 'https://www.vitality-matters.nl/artrose-in-beweging',
      ctaUrl2: 'https://vitality-matters.plugandpay.com/contactformulier',
    },
    mogelijk: {
      icon: '?', iconClass: 'icon-mogelijk',
      pill: 'Waarschijnlijk geschikt', pillClass: 'pill-mogelijk',
      title: 'Het programma sluit waarschijnlijk goed aan bij uw situatie',
      intro: 'Er zijn wel één of meerdere punten die ik graag even met u wil doornemen, zodat ik zeker weet dat het programma aansluit bij uw situatie.',
      ctaKlasse: 'cta-mogelijk', ctaBtnKlasse: 'btn-cta-mogelijk',
      ctaTitel: 'Ik neem graag contact met u op',
      ctaTekst: 'Ik neem graag contact met u op om samen te bekijken of het programma aansluit bij uw persoonlijke situatie en om eventuele vragen of twijfels te bespreken.',
      ctaLabel: 'Ga naar de pagina →',
      ctaLabel2: 'Laat uw gegevens achter →',
      ctaUrl: 'https://www.vitality-matters.nl/artrose-in-beweging',
      ctaUrl2: 'https://vitality-matters.plugandpay.com/contactformulier',
    },
    nee: {
      icon: '!', iconClass: 'icon-nee',
      pill: 'Niet geschikt', pillClass: 'pill-nee',
      title: 'Het programma past op dit moment niet bij uw situatie',
      intro: 'Op basis van uw antwoorden lijkt Artrose in Beweging op dit moment niet de beste keuze voor u. Hieronder leest u waarom.',
      ctaKlasse: 'cta-nee', ctaBtnKlasse: 'btn-cta-nee',
      ctaTitel: 'Heeft u vragen over uw situatie?',
      ctaTekst: 'Neem gerust contact op via <a href="mailto:info@vitality-matters.nl" style="color:#fff;text-decoration:underline;">info@vitality-matters.nl</a>. Ik denk graag mee over wat wél bij u past.',
      ctaLabel: null,
      ctaUrl: null,
    },
  };

  const d = data[uitslag];
  const icon = document.getElementById('result-icon');
  icon.className = 'result-icon ' + d.iconClass;
  icon.textContent = d.icon;
  document.getElementById('result-pill').className = 'result-pill ' + d.pillClass;
  document.getElementById('result-pill').textContent = d.pill;
  document.getElementById('result-title').textContent = d.title;
  document.getElementById('result-intro').textContent = d.intro;

  const reasonsEl = document.getElementById('result-reasons');
  reasonsEl.innerHTML = '';
  const toonRedenen = uitslag === 'nee' ? hardNee : mogelijkRedenen;
  toonRedenen.forEach(r => {
    if (!redenen[r]) return;
    const blk = document.createElement('div');
    blk.className = 'reason-block';
    blk.innerHTML = `<h3>${redenen[r].titel}</h3><p>${redenen[r].tekst}</p>`;
    reasonsEl.appendChild(blk);
  });

  document.getElementById('result-cta').className = 'cta-block ' + d.ctaKlasse;
  const btn2 = d.ctaUrl2
    ? `<a class="btn-cta ${d.ctaBtnKlasse}" href="${d.ctaUrl2}" target="_blank" rel="noopener" style="margin-top:12px;display:inline-block;opacity:0.85;">${d.ctaLabel2}</a>`
    : '';
  const btn1 = d.ctaLabel
    ? `<a class="btn-cta ${d.ctaBtnKlasse}" href="${d.ctaUrl}" target="_blank" rel="noopener">${d.ctaLabel}</a>`
    : '';
  document.getElementById('result-cta').innerHTML = `
    <h3>${d.ctaTitel}</h3>
    <p>${d.ctaTekst}</p>
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:4px;">${btn1}${btn2}</div>
  `;
}

function restart() {
  current = 0; answers = new Array(TOTAL).fill(null);
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('quiz-section').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

render();
</script>
</body>
</html>
